<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altara — Canvas vs SVG benchmark</title>
    <style>
      body {
        margin: 0;
        background: #181a1b;
        color: #e8e6df;
        font-family: -apple-system, system-ui, sans-serif;
      }
      .bench-controls {
        padding: 12px 16px;
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 1px solid #2e3133;
      }
      button {
        background: #2e3133;
        color: #e8e6df;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 6px 12px;
        cursor: pointer;
        font: inherit;
      }
      button:hover {
        background: #3a3e40;
      }
      pre {
        padding: 12px 16px;
        margin: 0;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        white-space: pre-wrap;
      }
      #stage {
        width: 100%;
        height: 420px;
        position: relative;
      }
      svg,
      canvas {
        display: block;
        width: 100%;
        height: 420px;
      }
    </style>
  </head>
  <body>
    <div class="bench-controls">
      <strong>Canvas vs SVG @ 60fps</strong>
      <label>N <input id="n" type="number" value="50" min="1" style="width: 64px" /></label>
      <button id="run-svg-react">Run SVG (React)</button>
      <button id="run-svg-imperative">Run SVG (imperative)</button>
      <button id="run-canvas">Run Canvas</button>
      <button id="run-matrix">Run full matrix</button>
      <button id="run-alloc">Run alloc bench</button>
    </div>
    <pre id="out">Pick a renderer and N, or click "Run full matrix". Results also exposed at window.__bench for automation.</pre>
    <div id="stage"></div>
    <script type="module" src="/bench/bench.tsx"></script>
  </body>
</html>
